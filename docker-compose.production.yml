name: ai-job-radar-production
services:
  postgres:
    image: postgres:17.5-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME:?Set DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME:?Set DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits: { memory: 1G, cpus: "1.0" }
    security_opt: ["no-new-privileges:true"]
  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    restart: always
    command: server /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?Set S3_SECRET_KEY}
    volumes: [minio-data:/data]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
    security_opt: ["no-new-privileges:true"]
  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    restart: "no"
    depends_on:
      minio: { condition: service_healthy }
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?Set S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:?Set S3_BUCKET}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY" &&
        mc mb --ignore-existing local/"$$S3_BUCKET" &&
        mc anonymous set none local/"$$S3_BUCKET"
    security_opt: ["no-new-privileges:true"]
  backend:
    image: ${BACKEND_IMAGE:?Set an immutable BACKEND_IMAGE tag or digest}
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    environment:
      APP_ENV: production
      DATABASE_URL: jdbc:postgresql://postgres:5432/${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?Set the public HTTPS origin}
      SESSION_COOKIE_SECURE: "true"
      DEV_SEED_ENABLED: "false"
      OPENAPI_ENABLED: "false"
      AI_ENABLED: ${AI_ENABLED:-false}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    expose: ["8080"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 40s
    read_only: true
    tmpfs: ["/tmp:rw,noexec,nosuid,size=128m"]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits: { memory: 1G, cpus: "1.0" }
  frontend:
    image: ${FRONTEND_IMAGE:?Set an immutable FRONTEND_IMAGE tag or digest}
    restart: always
    depends_on:
      backend: { condition: service_healthy }
    ports: ["127.0.0.1:8080:8080"]
    read_only: true
    tmpfs: ["/tmp:rw,noexec,nosuid,size=32m", "/var/cache/nginx:rw,noexec,nosuid,size=32m"]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.5" }
volumes:
  postgres-data:
  minio-data:

spring:
  application:
    name: ai-job-radar
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/aijobradar}
    username: ${DATABASE_USERNAME:aijobradar}
    password: ${DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: ${DATABASE_POOL_MAX_SIZE:10}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:10MB}
      max-request-size: ${MAX_UPLOAD_SIZE:10MB}
  session:
    jdbc:
      initialize-schema: never
    timeout: 8h
server:
  port: ${BACKEND_PORT:8080}
  servlet:
    session:
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: lax
  error:
    include-message: never
    include-stacktrace: never
management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
springdoc:
  api-docs:
    enabled: ${OPENAPI_ENABLED:true}
  swagger-ui:
    enabled: ${OPENAPI_ENABLED:true}
radar:
  environment: ${APP_ENV:development}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}
  seed:
    enabled: ${DEV_SEED_ENABLED:false}
    email: ${DEV_SEED_EMAIL:}
    password: ${DEV_SEED_PASSWORD:}
    display-name: ${DEV_SEED_DISPLAY_NAME:Local Developer}
    customize-profile: ${DEV_SEED_PROFILE_ENABLED:false}
  storage:
    enabled: ${STORAGE_ENABLED:true}
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:aijobradar}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
  ai:
    enabled: ${AI_ENABLED:false}
    groq-api-key: ${GROQ_API_KEY:}
    base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
    fast-model: ${GROQ_MODEL_FAST:llama-3.1-8b-instant}
    quality-model: ${GROQ_MODEL_QUALITY:llama-3.3-70b-versatile}
    request-timeout-seconds: ${GROQ_REQUEST_TIMEOUT_SECONDS:60}
    max-retries: ${GROQ_MAX_RETRIES:2}
    daily-token-budget: ${GROQ_DAILY_TOKEN_BUDGET:0}
  sources:
    scheduling-enabled: ${JOB_SOURCES_ENABLED:false}
    cron: ${SOURCE_SCHEDULER_CRON:0 0 */4 * * *}
    timezone: ${APP_TIMEZONE:Africa/Casablanca}
  operations:
    retention-batch-size: ${RETENTION_BATCH_SIZE:500}
    failed-source-alert-threshold: ${FAILED_SOURCE_ALERT_THRESHOLD:3}
    failed-ai-alert-threshold: ${FAILED_AI_ALERT_THRESHOLD:2}
    monitor-cron: ${OPERATIONS_MONITOR_CRON:0 */5 * * * *}
    retention-cron: ${RETENTION_CRON:0 20 2 * * *}
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.springframework.security: INFO

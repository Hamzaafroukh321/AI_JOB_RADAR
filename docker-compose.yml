name: ai-job-radar

services:
  postgres:
    image: postgres:17.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:?Copy .env.example to .env first}
      POSTGRES_USER: ${DATABASE_USERNAME:?Set DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?Set S3_SECRET_KEY}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?Set S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:?Set S3_BUCKET}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 "$${S3_ACCESS_KEY}" "$${S3_SECRET_KEY}" &&
        mc mb --ignore-existing local/"$${S3_BUCKET}" &&
        mc anonymous set none local/"$${S3_BUCKET}"

  mailpit:
    image: axllent/mailpit:v1.27.8
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: jdbc:postgresql://postgres:5432/${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      DEV_SEED_ENABLED: ${DEV_SEED_ENABLED:-false}
      DEV_SEED_EMAIL: ${DEV_SEED_EMAIL:-}
      DEV_SEED_PASSWORD: ${DEV_SEED_PASSWORD:-}
      DEV_SEED_DISPLAY_NAME: ${DEV_SEED_DISPLAY_NAME:-Hamza Afroukh}
      DEV_SEED_PROFILE_ENABLED: ${DEV_SEED_PROFILE_ENABLED:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:4200}
      JOB_SOURCES_ENABLED: ${JOB_SOURCES_ENABLED:-true}
      GROQ_API_KEY: ""
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health/liveness"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s

  frontend:
    build:
      context: frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:4200:8080"

volumes:
  postgres-data:
  minio-data:
